apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.28.0 (HEAD)
  creationTimestamp: null
  labels:
    io.kompose.service: home-user
  name: home-user
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: home-user
  strategy: {}
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.28.0 (HEAD)
      creationTimestamp: null
      labels:
        io.kompose.network/compose-amur: "true"
        io.kompose.service: home-user
    spec:
      imagePullSecrets:
        - name: aliyun
      containers:
        - env:
            - name: JAVA_OPTS
              value: -Xms256m -Xmx256m
            - name: SPRING_CLOUD_NACOS_CONFIG_GROUP
              value: DEFAULT_GROUP
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVERADDR
              value: nacos:8848
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR
              value: nacos:8848
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://db:3306/homeedu?characterEncoding=utf8&connectTimeout=5000&socketTimeout=10000&autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            - name: SPRING_DATASOURCE_USERNAME
              value: root
          image: registry.cn-beijing.aliyuncs.com/amur/home-user:latest
          name: home-user
          ports:
            - containerPort: 8701
            - containerPort: 9701
          resources: {}
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.28.0 (HEAD)
  creationTimestamp: null
  labels:
    io.kompose.service: home-user
  name: home-user
spec:
  type: NodePort
  ports:
    - name: "8701"
      port: 8701
      targetPort: 8701
    - name: "9701"
      port: 9701
      targetPort: 9701
  selector:
    io.kompose.service: home-user
status:
  loadBalancer: {}
