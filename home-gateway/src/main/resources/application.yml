server:
  port: 80
spring:
  application:
    name: home-gateway
  banner:
    location: banner.txt
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
      config:
        group: DEFAULT_GROUP
        server-addr: 127.0.0.1:8848
    gateway:
      globalcors:
        cors-configurations:
          '[/**]': # 匹配所有请求
            allowedOrigins: "*" #跨域处理 允许所有的域
            allowedMethods: # 支持的方法
              - GET
              - POST
              - PUT
              - DELETE
      routes:
        - id: home-user
          uri: lb://home-user
          predicates:
            - Path=/home-user/**
        - id: home-tinyid
          uri: lb://home-tinyid
          predicates:
            - Path=/home-tinyid/**
      #          filters:
      #            - StripPrefix=1
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

  config:
    import:
      - optional:nacos:home-gateway.yml
#  web:
#    resources:
#      add-mappings: true
grpc:
  server:
    port: 9080
