server:
  port: 80
spring:
  application:
    name: home-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.2.154:8848
        username: nacos
        password: nacos
      config:
        group: DEFAULT_GROUP
        server-addr: 192.168.2.154:8848
    gateway:
      routes:
#        - id: home-class
#          uri: lb://home-class
#          predicates:
#            - Path=/home-class/**
#          filters:
#            - StripPrefix=1
#        - id: home-msg
#          uri: lb://home-msg
#          predicates:
#            - Path=/home-msg/**
#          filters:
#            - StripPrefix=1
#        - id: home-rtc
#          uri: lb://home-rtc
#          predicates:
#            - Path=/home-rtc/**
#          filters:
#            - StripPrefix=1
        - id: home-user
          uri: lb://home-user
          predicates:
            - Path=/home-user/**
          filters:
            - StripPrefix=1
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

  config:
    import:
      - optional:nacos:home-gateway.yml
  web:
    resources:
      add-mappings: true
