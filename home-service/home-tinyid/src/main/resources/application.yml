server:
  port: 8700
#  servlet:
#    context-path: /tinyid
datasource:
  tinyid:
    names: primary
    type: org.apache.tomcat.jdbc.pool.DataSource
    primary:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/tinyid?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      username: root
      password: root
batch:
  size:
    max: 100000
spring:
  application:
    name: home-tinyid
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
  config:
    import:
      - optional:nacos:home-tinyid.yml
  banner:
    location: banner.txt

mybatis-plus:
  global-config:
    banner: false

grpc:
  server:
    port: 9700
    in-process-name: home-tinyid

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.amur.home.tinyid.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-host: true
    enable-host-text: 127.0.0.1/home-tinyid #填写为网关地址,用于在网关聚合界面调试接口
  basic:
    enable: false
    username: admin
    password: 123456
  # 开启生产环境屏蔽
  production: false