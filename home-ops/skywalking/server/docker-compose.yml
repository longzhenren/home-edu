version: '3.4'

services:
  es7:
    container_name: es7
    hostname: es7
    image: elasticsearch:7.16.2
    expose:
      - 9200
      - 9300
    ports:
      - 9200:9200
    networks:
      - skywalking
    environment:
#      - TAKE_FILE_OWNERSHIP=true #volumes 挂载权限 如果不想要挂载es文件改配置可以删除
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
#    volumes:
#      - /Users/zhangzhibo/Documents/Development/data/elasticsearch/data:/usr/share/elasticsearch/data
#      - /Users/zhangzhibo/Documents/Development/data/elasticsearch/logs:/usr/share/elasticsearch/logs

  oap:
    container_name: oap
    hostname: oap
    image: apache/skywalking-oap-server:9.3.0
    expose:
      - 11800
      - 12800
      - 5005
    ports:
      - 11800:11800
    networks:
      - skywalking
    restart: on-failure
    environment:
      - SW_STORAGE=elasticsearch
      - SW_STORAGE_ES_CLUSTER_NODES="es7:9200"
      - TZ=Asia/Shanghai
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -zn 127.0.0.1 11800" ]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      - "es7"

  ui:
    image: registry.cn-beijing.aliyuncs.com/amur/home-sw-ui:latest
    ports:
      - "8888:8888"
    networks:
      - skywalking
    environment:
      - SW_PROXY_TARGET=http://oap:12800
      - TZ=Asia/Shanghai
    depends_on:
      - oap
    restart: on-failure
    links:
      - oap


networks:
  skywalking:
